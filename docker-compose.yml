services:
  redis:
    image: redis:7-alpine
    container_name: rag-engine-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-engine-web
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rag-engine-worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
